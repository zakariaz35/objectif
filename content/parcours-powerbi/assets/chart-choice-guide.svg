<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="560" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Guide de choix de graphique</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#64748b">Quel visuel pour quel message ?</text>

  <!-- ── COMPARAISON ── -->
  <rect x="16" y="64" width="374" height="210" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="16" y="64" width="374" height="36" rx="10" fill="#3b82f6"/>
  <rect x="16" y="88" width="374" height="12" fill="#3b82f6"/>
  <text x="203" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">COMPARAISON</text>
  <text x="203" y="102" text-anchor="middle" font-size="11" fill="#dbeafe">Quel est le plus grand / meilleur ?</text>

  <!-- mini bar chart illus -->
  <rect x="32" y="118" width="80" height="14" rx="2" fill="#1d4ed8"/>
  <rect x="32" y="136" width="56" height="14" rx="2" fill="#3b82f6"/>
  <rect x="32" y="154" width="38" height="14" rx="2" fill="#60a5fa"/>
  <rect x="32" y="172" width="24" height="14" rx="2" fill="#93c5fd"/>
  <text x="120" y="128" font-size="9" fill="#1e40af">Electronics  120 k</text>
  <text x="120" y="146" font-size="9" fill="#1e40af">Furniture    84 k</text>
  <text x="120" y="164" font-size="9" fill="#1e40af">Office       57 k</text>
  <text x="120" y="182" font-size="9" fill="#1e40af">Toys         36 k</text>

  <text x="32" y="204" font-size="11" font-weight="600" fill="#1e40af">Visuels recommandés</text>
  <text x="32" y="220" font-size="11" fill="#1e3a8a">→ Barres horizontales triées par valeur</text>
  <text x="32" y="236" font-size="11" fill="#1e3a8a">→ Colonnes (groupées) pour 2-4 catégories</text>
  <text x="32" y="256" font-size="11" fill="#dc2626">✗ Camembert (difficile à comparer des angles)</text>
  <text x="32" y="272" font-size="11" fill="#dc2626">✗ 3D (déforme les longueurs)</text>

  <!-- ── ÉVOLUTION ── -->
  <rect x="410" y="64" width="374" height="210" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="410" y="64" width="374" height="36" rx="10" fill="#16a34a"/>
  <rect x="410" y="88" width="374" height="12" fill="#16a34a"/>
  <text x="597" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">ÉVOLUTION</text>
  <text x="597" y="102" text-anchor="middle" font-size="11" fill="#dcfce7">Comment ça évolue dans le temps ?</text>

  <!-- mini line chart illus -->
  <polyline points="426,170 456,155 486,160 516,140 546,148 576,135 606,142"
            fill="none" stroke="#16a34a" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="426" cy="170" r="3" fill="#16a34a"/>
  <circle cx="516" cy="140" r="3" fill="#16a34a"/>
  <circle cx="606" cy="142" r="3" fill="#16a34a"/>
  <text x="426" y="185" font-size="8" fill="#64748b">Jan</text>
  <text x="516" y="185" font-size="8" fill="#64748b">Avr</text>
  <text x="596" y="185" font-size="8" fill="#64748b">Juil</text>

  <text x="426" y="207" font-size="11" font-weight="600" fill="#14532d">Visuels recommandés</text>
  <text x="426" y="223" font-size="11" fill="#166534">→ Courbe (line chart) — dimension Date en abscisse</text>
  <text x="426" y="239" font-size="11" fill="#166534">→ Aires (area) pour mettre en valeur le volume</text>
  <text x="426" y="259" font-size="11" fill="#dc2626">✗ Barres non triées pour du temporel</text>
  <text x="426" y="275" font-size="11" fill="#dc2626">✗ Axe Y tronqué sur les barres temporelles</text>

  <!-- ── RÉPARTITION ── -->
  <rect x="16" y="290" width="374" height="210" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="16" y="290" width="374" height="36" rx="10" fill="#f59e0b"/>
  <rect x="16" y="314" width="374" height="12" fill="#f59e0b"/>
  <text x="203" y="311" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">RÉPARTITION</text>
  <text x="203" y="328" text-anchor="middle" font-size="11" fill="#fef3c7">Quelle part représente chaque élément ?</text>

  <!-- mini stacked bar -->
  <rect x="32" y="350" width="180" height="20" rx="2" fill="#fbbf24"/>
  <rect x="32" y="350" width="110" height="20" rx="2" fill="#f59e0b"/>
  <rect x="32" y="350" width="64" height="20" rx="2" fill="#d97706"/>
  <rect x="32" y="350" width="30" height="20" rx="2" fill="#92400e"/>
  <text x="32" y="385" font-size="9" fill="#78350f">Electronics · Furniture · Office · Other</text>

  <!-- mini treemap -->
  <rect x="32" y="395" width="90" height="50" rx="2" fill="#fbbf24" opacity="0.9"/>
  <text x="77" y="424" text-anchor="middle" font-size="9" fill="#78350f">Elec. 36%</text>
  <rect x="126" y="395" width="62" height="50" rx="2" fill="#f59e0b" opacity="0.9"/>
  <text x="157" y="424" text-anchor="middle" font-size="9" fill="#78350f">Furn. 25%</text>
  <rect x="192" y="395" width="46" height="50" rx="2" fill="#d97706" opacity="0.9"/>
  <text x="215" y="424" text-anchor="middle" font-size="9" fill="#78350f">Off.</text>

  <text x="32" y="460" font-size="11" font-weight="600" fill="#78350f">Visuels recommandés</text>
  <text x="32" y="476" font-size="11" fill="#92400e">→ Barres empilées à 100 %  → Treemap</text>
  <text x="32" y="492" font-size="11" fill="#dc2626">✗ Camembert si plus de 3 parts similaires</text>

  <!-- ── CORRÉLATION ── -->
  <rect x="410" y="290" width="374" height="210" rx="10" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="410" y="290" width="374" height="36" rx="10" fill="#a855f7"/>
  <rect x="410" y="314" width="374" height="12" fill="#a855f7"/>
  <text x="597" y="311" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">CORRÉLATION</text>
  <text x="597" y="328" text-anchor="middle" font-size="11" fill="#f3e8ff">Y a-t-il une relation entre deux mesures ?</text>

  <!-- mini scatter -->
  <circle cx="440" cy="420" r="4" fill="#a855f7" opacity="0.7"/>
  <circle cx="465" cy="400" r="5" fill="#a855f7" opacity="0.7"/>
  <circle cx="490" cy="385" r="4" fill="#a855f7" opacity="0.7"/>
  <circle cx="515" cy="405" r="3" fill="#a855f7" opacity="0.7"/>
  <circle cx="540" cy="370" r="6" fill="#a855f7" opacity="0.7"/>
  <circle cx="565" cy="390" r="4" fill="#a855f7" opacity="0.7"/>
  <circle cx="590" cy="362" r="5" fill="#a855f7" opacity="0.7"/>
  <line x1="435" y1="430" x2="598" y2="355" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="440" y="448" font-size="8" fill="#94a3b8">Budget pub →</text>
  <text x="420" y="422" font-size="8" fill="#94a3b8" transform="rotate(-90,420,400)">Ventes ↑</text>

  <text x="426" y="460" font-size="11" font-weight="600" fill="#6b21a8">Visuel recommandé</text>
  <text x="426" y="476" font-size="11" fill="#7e22ce">→ Nuage de points (scatter) — 1 mesure / axe</text>
  <text x="426" y="492" font-size="11" fill="#dc2626">✗ Double axe Y (fait dire n'importe quoi)</text>

  <!-- Bottom row: rule reminder -->
  <rect x="16" y="512" width="768" height="38" rx="8" fill="#1e293b"/>
  <text x="400" y="527" text-anchor="middle" font-size="11" font-weight="600" fill="#f8fafc">Règle mnémotechnique : identifie le VERBE de la demande métier.</text>
  <text x="400" y="543" text-anchor="middle" font-size="11" fill="#cbd5e1">Comparer → barres  ·  Évoluer → courbe  ·  Répartir → empilé / treemap  ·  Corréler → scatter</text>
</svg>
