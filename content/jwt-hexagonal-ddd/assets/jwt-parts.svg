<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 140" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <g>
    <rect x="10" y="30" width="200" height="56" rx="8" fill="#3a1f2b" stroke="#ff6b9d"/>
    <text x="110" y="58" fill="#ff6b9d" font-size="15" font-weight="700" text-anchor="middle">HEADER</text>
    <text x="110" y="76" fill="#ff9dc0" font-size="12" text-anchor="middle">algo de signature</text>

    <rect x="230" y="30" width="200" height="56" rx="8" fill="#241f3a" stroke="#9d7bff"/>
    <text x="330" y="58" fill="#9d7bff" font-size="15" font-weight="700" text-anchor="middle">PAYLOAD</text>
    <text x="330" y="76" fill="#c3b2ff" font-size="12" text-anchor="middle">les données (claims)</text>

    <rect x="450" y="30" width="200" height="56" rx="8" fill="#16332e" stroke="#5be3c0"/>
    <text x="550" y="58" fill="#5be3c0" font-size="15" font-weight="700" text-anchor="middle">SIGNATURE</text>
    <text x="550" y="76" fill="#9bf0db" font-size="12" text-anchor="middle">le sceau</text>

    <text x="218" y="66" fill="#9aa4b8" font-size="20" text-anchor="middle">.</text>
    <text x="438" y="66" fill="#9aa4b8" font-size="20" text-anchor="middle">.</text>

    <text x="330" y="115" fill="#9aa4b8" font-size="12.5" text-anchor="middle">HEADER et PAYLOAD sont seulement encodés en Base64URL — lisibles par tous.</text>
  </g>
</svg>
