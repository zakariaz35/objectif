<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 400" width="740" height="400"
     font-family="'Segoe UI', Arial, sans-serif" font-size="13">

  <!-- background -->
  <rect width="740" height="400" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="370" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Fonctions fenêtre — PARTITION BY + ROW_NUMBER</text>

  <!-- ===== Input table ===== -->
  <text x="20" y="58" font-size="12" font-weight="bold" fill="#374151">Table orders (entrée)</text>

  <!-- header -->
  <rect x="20" y="65" width="200" height="22" fill="#334155" rx="3"/>
  <text x="30" y="80" font-size="11" fill="#f1f5f9">order_id</text>
  <text x="100" y="80" font-size="11" fill="#f1f5f9">category</text>
  <text x="170" y="80" font-size="11" fill="#f1f5f9">amount</text>

  <!-- rows — alternating -->
  <rect x="20" y="87" width="200" height="20" fill="#f0f9ff"/>
  <text x="30"  y="101" font-size="11" fill="#0f172a">1</text>
  <text x="100" y="101" font-size="11" fill="#0f172a">Office</text>
  <text x="170" y="101" font-size="11" fill="#0f172a">200</text>

  <rect x="20" y="107" width="200" height="20" fill="#ecfdf5"/>
  <text x="30"  y="121" font-size="11" fill="#0f172a">2</text>
  <text x="100" y="121" font-size="11" fill="#0f172a">Hardware</text>
  <text x="170" y="121" font-size="11" fill="#0f172a">900</text>

  <rect x="20" y="127" width="200" height="20" fill="#f0f9ff"/>
  <text x="30"  y="141" font-size="11" fill="#0f172a">3</text>
  <text x="100" y="141" font-size="11" fill="#0f172a">Office</text>
  <text x="170" y="141" font-size="11" fill="#0f172a">120</text>

  <rect x="20" y="147" width="200" height="20" fill="#ecfdf5"/>
  <text x="30"  y="161" font-size="11" fill="#0f172a">4</text>
  <text x="100" y="161" font-size="11" fill="#0f172a">Hardware</text>
  <text x="170" y="161" font-size="11" fill="#0f172a">400</text>

  <rect x="20" y="167" width="200" height="20" fill="#f0f9ff"/>
  <text x="30"  y="181" font-size="11" fill="#0f172a">5</text>
  <text x="100" y="181" font-size="11" fill="#0f172a">Office</text>
  <text x="170" y="181" font-size="11" fill="#0f172a">50</text>

  <rect x="20" y="187" width="200" height="20" fill="#ecfdf5"/>
  <text x="30"  y="201" font-size="11" fill="#0f172a">6</text>
  <text x="100" y="201" font-size="11" fill="#0f172a">Hardware</text>
  <text x="170" y="201" font-size="11" fill="#0f172a">150</text>

  <!-- border -->
  <rect x="20" y="65" width="200" height="142" fill="none" stroke="#94a3b8" stroke-width="1" rx="3"/>

  <!-- ===== Arrow + PARTITION BY label ===== -->
  <text x="250" y="130" font-size="11" fill="#7c3aed" font-weight="bold">PARTITION BY category</text>
  <text x="250" y="145" font-size="11" fill="#7c3aed">ORDER BY amount DESC</text>
  <line x1="230" y1="140" x2="310" y2="140" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- ===== Partitions ===== -->
  <!-- Office partition -->
  <rect x="320" y="65" width="170" height="90" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="4"/>
  <text x="405" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Partition : Office</text>
  <text x="330" y="98"  font-size="10" fill="#1e3a5f">ord 1 — 200</text>
  <text x="330" y="113" font-size="10" fill="#1e3a5f">ord 3 — 120</text>
  <text x="330" y="128" font-size="10" fill="#1e3a5f">ord 5 —  50</text>
  <text x="400" y="98"  font-size="10" fill="#1d4ed8" font-weight="bold">rn = 1</text>
  <text x="400" y="113" font-size="10" fill="#1d4ed8" font-weight="bold">rn = 2</text>
  <text x="400" y="128" font-size="10" fill="#1d4ed8" font-weight="bold">rn = 3</text>

  <!-- Hardware partition -->
  <rect x="320" y="168" width="170" height="90" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="4"/>
  <text x="405" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">Partition : Hardware</text>
  <text x="330" y="201" font-size="10" fill="#14532d">ord 2 — 900</text>
  <text x="330" y="216" font-size="10" fill="#14532d">ord 4 — 400</text>
  <text x="330" y="231" font-size="10" fill="#14532d">ord 6 — 150</text>
  <text x="400" y="201" font-size="10" fill="#166534" font-weight="bold">rn = 1</text>
  <text x="400" y="216" font-size="10" fill="#166534" font-weight="bold">rn = 2</text>
  <text x="400" y="231" font-size="10" fill="#166534" font-weight="bold">rn = 3</text>

  <!-- ===== Arrow to output ===== -->
  <line x1="500" y1="140" x2="560" y2="140" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="513" y="132" font-size="10" fill="#6b7280">résultat</text>

  <!-- ===== Output table (enriched) ===== -->
  <text x="570" y="58" font-size="12" font-weight="bold" fill="#374151">Sortie (toutes les lignes +  rn)</text>

  <!-- header -->
  <rect x="570" y="65" width="150" height="22" fill="#334155" rx="3"/>
  <text x="578" y="80" font-size="10" fill="#f1f5f9">order_id</text>
  <text x="630" y="80" font-size="10" fill="#f1f5f9">amount</text>
  <text x="688" y="80" font-size="10" fill="#f1f5f9">rn</text>

  <!-- Office rows (blue tint) -->
  <rect x="570" y="87" width="150" height="20" fill="#dbeafe"/>
  <text x="578" y="101" font-size="10" fill="#0f172a">1 (Office)</text>
  <text x="635" y="101" font-size="10" fill="#0f172a">200</text>
  <text x="695" y="101" font-size="10" fill="#1d4ed8" font-weight="bold">1</text>

  <rect x="570" y="107" width="150" height="20" fill="#dbeafe"/>
  <text x="578" y="121" font-size="10" fill="#0f172a">3 (Office)</text>
  <text x="635" y="121" font-size="10" fill="#0f172a">120</text>
  <text x="695" y="121" font-size="10" fill="#1d4ed8" font-weight="bold">2</text>

  <rect x="570" y="127" width="150" height="20" fill="#dbeafe"/>
  <text x="578" y="141" font-size="10" fill="#0f172a">5 (Office)</text>
  <text x="635" y="141" font-size="10" fill="#0f172a">50</text>
  <text x="695" y="141" font-size="10" fill="#1d4ed8" font-weight="bold">3</text>

  <!-- Hardware rows (green tint) -->
  <rect x="570" y="147" width="150" height="20" fill="#dcfce7"/>
  <text x="578" y="161" font-size="10" fill="#0f172a">2 (Hardware)</text>
  <text x="635" y="161" font-size="10" fill="#0f172a">900</text>
  <text x="695" y="161" font-size="10" fill="#166534" font-weight="bold">1</text>

  <rect x="570" y="167" width="150" height="20" fill="#dcfce7"/>
  <text x="578" y="181" font-size="10" fill="#0f172a">4 (Hardware)</text>
  <text x="635" y="181" font-size="10" fill="#0f172a">400</text>
  <text x="695" y="181" font-size="10" fill="#166534" font-weight="bold">2</text>

  <rect x="570" y="187" width="150" height="20" fill="#dcfce7"/>
  <text x="578" y="201" font-size="10" fill="#0f172a">6 (Hardware)</text>
  <text x="635" y="201" font-size="10" fill="#0f172a">150</text>
  <text x="695" y="201" font-size="10" fill="#166534" font-weight="bold">3</text>

  <!-- border output -->
  <rect x="570" y="65" width="150" height="142" fill="none" stroke="#94a3b8" stroke-width="1" rx="3"/>

  <!-- "toutes les lignes conservées" note -->
  <text x="645" y="230" text-anchor="middle" font-size="10" fill="#64748b">6 lignes entrée → 6 lignes sortie</text>
  <text x="645" y="244" text-anchor="middle" font-size="10" fill="#64748b">(pas de réduction)</text>

  <!-- ===== SQL label ===== -->
  <rect x="20" y="285" width="700" height="80" fill="#1e293b" rx="6"/>
  <text x="36" y="305" font-size="11" fill="#94a3b8">-- ROW_NUMBER — numéro unique par partition, trié amount DESC</text>
  <text x="36" y="322" font-size="11" fill="#e2e8f0">ROW_NUMBER() OVER (PARTITION BY category ORDER BY amount DESC) AS rn</text>
  <text x="36" y="342" font-size="11" fill="#94a3b8">-- Pour top-N : calculer rn dans une CTE, puis WHERE rn &lt;= N</text>
  <text x="36" y="358" font-size="11" fill="#e2e8f0">WHERE rn &lt;= 2   <tspan fill="#94a3b8">-- top 2 par catégorie</tspan></text>

</svg>
