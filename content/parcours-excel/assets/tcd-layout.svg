<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" font-family="Segoe UI, Arial, sans-serif" font-size="14">
  <!-- Background -->
  <rect width="680" height="420" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="340" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Zones d'un Tableau Croisé Dynamique</text>

  <!-- === ZONE FILTRES (top) === -->
  <rect x="30" y="58" width="620" height="72" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="340" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6">FILTRES (Slicers / filtres généraux)</text>
  <text x="340" y="97" text-anchor="middle" font-size="12" fill="#4c1d95">Champs optionnels qui filtrent l'ensemble du TCD</text>
  <text x="340" y="114" text-anchor="middle" font-size="12" fill="#4c1d95">Exemple : order_date → "Année 2024"</text>

  <!-- Arrow down from Filtres -->
  <line x1="340" y1="130" x2="340" y2="148" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- === ROW: LIGNES + TABLE + COLONNES === -->
  <!-- LIGNES -->
  <rect x="30" y="150" width="160" height="180" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="110" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">LIGNES</text>
  <text x="110" y="194" text-anchor="middle" font-size="12" fill="#1e40af">Dimensions verticales</text>
  <text x="110" y="218" text-anchor="middle" font-size="12" fill="#1e40af">Ex :</text>
  <text x="110" y="237" text-anchor="middle" font-size="12" fill="#1e40af">category</text>
  <text x="110" y="256" text-anchor="middle" font-size="12" fill="#1e40af">region</text>
  <text x="110" y="275" text-anchor="middle" font-size="12" fill="#1e40af">supplier</text>
  <text x="110" y="294" text-anchor="middle" font-size="11" fill="#3b82f6" font-style="italic">→ une ligne par valeur</text>

  <!-- Arrow right from Lignes to Table -->
  <line x1="190" y1="240" x2="216" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TABLE (pivot result) -->
  <rect x="218" y="150" width="248" height="180" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="342" y="172" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">RÉSULTAT DU TCD</text>
  <!-- mini table -->
  <line x1="238" y1="185" x2="456" y2="185" stroke="#86efac" stroke-width="1"/>
  <text x="270" y="200" font-size="11" fill="#166534" font-weight="bold">category</text>
  <text x="360" y="200" font-size="11" fill="#166534" font-weight="bold">Nord</text>
  <text x="410" y="200" font-size="11" fill="#166534" font-weight="bold">Sud</text>
  <text x="440" y="200" font-size="11" fill="#166534" font-weight="bold">Total</text>
  <line x1="238" y1="206" x2="456" y2="206" stroke="#86efac" stroke-width="1"/>
  <text x="270" y="222" font-size="11" fill="#14532d">Hardware</text>
  <text x="360" y="222" font-size="11" fill="#14532d">500</text>
  <text x="410" y="222" font-size="11" fill="#14532d">300</text>
  <text x="440" y="222" font-size="11" fill="#14532d">800</text>
  <line x1="238" y1="228" x2="456" y2="228" stroke="#86efac" stroke-width="1"/>
  <text x="270" y="244" font-size="11" fill="#14532d">Office</text>
  <text x="360" y="244" font-size="11" fill="#14532d">200</text>
  <text x="410" y="244" font-size="11" fill="#14532d">150</text>
  <text x="440" y="244" font-size="11" fill="#14532d">350</text>
  <line x1="238" y1="250" x2="456" y2="250" stroke="#86efac" stroke-width="1"/>
  <text x="270" y="266" font-size="11" fill="#14532d" font-weight="bold">Total</text>
  <text x="360" y="266" font-size="11" fill="#14532d" font-weight="bold">700</text>
  <text x="410" y="266" font-size="11" fill="#14532d" font-weight="bold">450</text>
  <text x="440" y="266" font-size="11" fill="#14532d" font-weight="bold">1150</text>
  <text x="342" y="308" text-anchor="middle" font-size="11" fill="#16a34a" font-style="italic">Valeurs agrégées (SOMME, MOYENNE…)</text>

  <!-- Arrow left from Colonnes to Table -->
  <line x1="466" y1="240" x2="492" y2="240" stroke="#64748b" stroke-width="1.5"/>
  <line x1="466" y1="240" x2="466" y2="240" stroke="none"/>

  <!-- COLONNES -->
  <rect x="494" y="150" width="156" height="180" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="572" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="#b45309">COLONNES</text>
  <text x="572" y="194" text-anchor="middle" font-size="12" fill="#92400e">Dimensions horizontales</text>
  <text x="572" y="218" text-anchor="middle" font-size="12" fill="#92400e">Ex :</text>
  <text x="572" y="237" text-anchor="middle" font-size="12" fill="#92400e">region</text>
  <text x="572" y="256" text-anchor="middle" font-size="12" fill="#92400e">month_key</text>
  <text x="572" y="294" text-anchor="middle" font-size="11" fill="#d97706" font-style="italic">→ une col. par valeur</text>

  <!-- arrow from Colonnes to table (left) -->
  <line x1="494" y1="240" x2="468" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- === VALEURS (bottom) === -->
  <rect x="30" y="345" width="620" height="60" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="340" y="367" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">VALEURS (mesure agrégée)</text>
  <text x="340" y="388" text-anchor="middle" font-size="12" fill="#7f1d1d">Colonne numérique : SOMME de amount, MOYENNE de salary, NOMBRE de order_id…</text>

  <!-- Arrow up from Valeurs to table -->
  <line x1="342" y1="345" x2="342" y2="332" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
