<svg viewBox="0 0 470 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="to do2">
  <title id="to">Un objet : des paires clé → valeur</title>
  <desc id="do2">Un objet associe des clés (des noms) à des valeurs. On accède à une valeur par sa clé.</desc>
  <style>
    .h{font-family:system-ui,-apple-system,sans-serif;font-size:14px;font-weight:600;fill:#0f172a}
    .key{fill:#fff7ed;stroke:#f59e0b;stroke-width:1.5}
    .valb{fill:#eef2ff;stroke:#6366f1;stroke-width:1.5}
    .kt{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;fill:#0f172a;text-anchor:middle}
    .vt{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;fill:#0f172a;text-anchor:middle}
    .arrow{stroke:#475569;stroke-width:1.8;fill:none}
    .cap{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;fill:#334155}
  </style>
  <defs>
    <marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <text class="h" x="30" y="26">Un objet : des paires clé → valeur</text>
  <rect class="key" x="40" y="48" width="120" height="36" rx="8"/>
  <text class="kt" x="100" y="71">nom</text>
  <rect class="valb" x="280" y="48" width="150" height="36" rx="8"/>
  <text class="vt" x="355" y="71">"Ada"</text>
  <path class="arrow" marker-end="url(#ao)" d="M160 66 L278 66"/>
  <rect class="key" x="40" y="100" width="120" height="36" rx="8"/>
  <text class="kt" x="100" y="123">age</text>
  <rect class="valb" x="280" y="100" width="150" height="36" rx="8"/>
  <text class="vt" x="355" y="123">42</text>
  <path class="arrow" marker-end="url(#ao)" d="M160 118 L278 118"/>
  <rect class="key" x="40" y="152" width="120" height="36" rx="8"/>
  <text class="kt" x="100" y="175">actif</text>
  <rect class="valb" x="280" y="152" width="150" height="36" rx="8"/>
  <text class="vt" x="355" y="175">true</text>
  <path class="arrow" marker-end="url(#ao)" d="M160 170 L278 170"/>
  <text class="cap" x="40" y="210">perso["nom"]  →  "Ada"   (accès par la clé)</text>
</svg>
