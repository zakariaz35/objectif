<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="640" height="320" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="320" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Modèle de données — orders × products</text>

  <!-- ORDERS table -->
  <rect x="40" y="55" width="220" height="222" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="40" y="55" width="220" height="34" rx="8" fill="#3b82f6"/>
  <rect x="40" y="75" width="220" height="14" fill="#3b82f6"/>
  <text x="150" y="77" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">orders</text>

  <!-- Column rows -->
  <rect x="41" y="89" width="218" height="22" fill="#eff6ff"/>
  <text x="56" y="104" font-size="11" fill="#1e40af" font-weight="600">PK</text>
  <text x="80" y="104" font-size="11" fill="#1e293b">order_id</text>
  <text x="248" y="104" text-anchor="end" font-size="10" fill="#64748b">int</text>

  <rect x="41" y="111" width="218" height="22" fill="#ffffff"/>
  <text x="80" y="126" font-size="11" fill="#1e293b">order_date</text>
  <text x="248" y="126" text-anchor="end" font-size="10" fill="#64748b">date</text>

  <rect x="41" y="133" width="218" height="22" fill="#eff6ff"/>
  <text x="80" y="148" font-size="11" fill="#1e293b">customer_id</text>
  <text x="248" y="148" text-anchor="end" font-size="10" fill="#64748b">string</text>

  <rect x="41" y="155" width="218" height="22" fill="#ffffff"/>
  <text x="56" y="170" font-size="11" fill="#f59e0b" font-weight="600">FK</text>
  <text x="80" y="170" font-size="11" fill="#1e293b">product_id</text>
  <text x="248" y="170" text-anchor="end" font-size="10" fill="#64748b">string</text>

  <rect x="41" y="177" width="218" height="22" fill="#eff6ff"/>
  <text x="80" y="192" font-size="11" fill="#1e293b">quantity</text>
  <text x="248" y="192" text-anchor="end" font-size="10" fill="#64748b">int</text>

  <rect x="41" y="199" width="218" height="22" fill="#ffffff"/>
  <text x="80" y="214" font-size="11" fill="#1e293b">unit_price</text>
  <text x="248" y="214" text-anchor="end" font-size="10" fill="#64748b">number</text>

  <rect x="41" y="221" width="218" height="22" fill="#eff6ff"/>
  <text x="80" y="236" font-size="11" fill="#1e293b">discount</text>
  <text x="248" y="236" text-anchor="end" font-size="10" fill="#64748b">number (taux)</text>

  <rect x="41" y="243" width="218" height="22" fill="#ffffff" rx="0"/>
  <rect x="41" y="254" width="218" height="11" rx="0"/>
  <rect x="41" y="255" width="218" height="22" rx="0" fill="#ffffff"/>
  <text x="80" y="258" font-size="11" fill="#1e293b">region</text>
  <text x="248" y="258" text-anchor="end" font-size="10" fill="#64748b">string</text>
  <rect x="40" y="265" width="220" height="12" rx="8" fill="#ffffff" stroke="none"/>
  <rect x="41" y="267" width="218" height="8" fill="#ffffff"/>

  <!-- PRODUCTS table -->
  <rect x="380" y="85" width="220" height="160" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="380" y="85" width="220" height="34" rx="8" fill="#10b981"/>
  <rect x="380" y="105" width="220" height="14" fill="#10b981"/>
  <text x="490" y="107" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">products</text>

  <rect x="381" y="119" width="218" height="22" fill="#ecfdf5"/>
  <text x="396" y="134" font-size="11" fill="#065f46" font-weight="600">PK</text>
  <text x="420" y="134" font-size="11" fill="#1e293b">product_id</text>
  <text x="588" y="134" text-anchor="end" font-size="10" fill="#64748b">string</text>

  <rect x="381" y="141" width="218" height="22" fill="#ffffff"/>
  <text x="420" y="156" font-size="11" fill="#1e293b">name</text>
  <text x="588" y="156" text-anchor="end" font-size="10" fill="#64748b">string</text>

  <rect x="381" y="163" width="218" height="22" fill="#ecfdf5"/>
  <text x="420" y="178" font-size="11" fill="#1e293b">category</text>
  <text x="588" y="178" text-anchor="end" font-size="10" fill="#64748b">string</text>

  <rect x="381" y="185" width="218" height="22" fill="#ffffff"/>
  <rect x="381" y="196" width="218" height="11" fill="#ffffff"/>
  <text x="420" y="200" font-size="11" fill="#1e293b">cost</text>
  <text x="588" y="200" text-anchor="end" font-size="10" fill="#64748b">number (€)</text>
  <rect x="380" y="205" width="220" height="40" rx="8" fill="#ffffff" stroke="none"/>
  <rect x="381" y="207" width="218" height="36" fill="#ffffff"/>

  <!-- Relation arrow -->
  <line x1="260" y1="163" x2="380" y2="137" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 3"/>
  <!-- Arrow head -->
  <polygon points="372,130 385,130 378,142" fill="#f59e0b"/>
  <!-- Label -->
  <rect x="285" y="136" width="78" height="18" rx="4" fill="#fef3c7"/>
  <text x="324" y="148" text-anchor="middle" font-size="10" fill="#92400e" font-weight="600">product_id</text>

  <!-- Formula box -->
  <rect x="40" y="290" width="560" height="24" rx="6" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
  <text x="320" y="306" text-anchor="middle" font-size="11" fill="#713f12">
    Revenu ligne = quantity × unit_price × (1 − discount)   |   Marge ligne = Revenu − quantity × cost
  </text>
</svg>
