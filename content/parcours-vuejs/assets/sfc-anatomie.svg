<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ts ds">
  <title id="ts">Anatomie d'un composant Vue (SFC)</title>
  <desc id="ds">Un composant Vue à fichier unique (.vue) regroupe trois blocs : script setup (logique), template (affichage), style scoped (style).</desc>
  <style>
    .ttl{font-family:system-ui,-apple-system,sans-serif;font-size:14px;font-weight:600;fill:#0f172a}
    .file{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.5}
    .fn{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;fill:#475569}
    .tag{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:15px;font-weight:700;fill:#0f172a}
    .sub{font-family:system-ui,-apple-system,sans-serif;font-size:12px;fill:#64748b}
    .s1{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5}
    .s2{fill:#ecfdf5;stroke:#10b981;stroke-width:1.5}
    .s3{fill:#fef2f2;stroke:#ef4444;stroke-width:1.5}
  </style>
  <text class="ttl" x="24" y="26">Anatomie d'un composant Vue (SFC)</text>
  <rect class="file" x="40" y="44" width="400" height="238" rx="10"/>
  <text class="fn" x="60" y="68">MonComposant.vue</text>
  <rect class="s1" x="56" y="80" width="368" height="60" rx="8"/>
  <text class="tag" x="70" y="104">&lt;script setup&gt;</text>
  <text class="sub" x="70" y="126">la logique &amp; l'état — ref, computed, fonctions</text>
  <rect class="s2" x="56" y="150" width="368" height="60" rx="8"/>
  <text class="tag" x="70" y="174">&lt;template&gt;</text>
  <text class="sub" x="70" y="196">l'affichage — HTML + directives (v-if, v-for, @click)</text>
  <rect class="s3" x="56" y="220" width="368" height="52" rx="8"/>
  <text class="tag" x="70" y="244">&lt;style scoped&gt;</text>
  <text class="sub" x="70" y="264">le style, limité à ce composant</text>
</svg>
