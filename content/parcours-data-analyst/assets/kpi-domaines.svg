<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" width="860" height="340" font-family="system-ui, sans-serif">
  <rect width="860" height="340" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">Arbre des KPI par domaine métier</text>

  <!-- Root: KPI -->
  <rect x="355" y="45" width="150" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="430" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#f1f5f9">KPI Métier</text>

  <!-- Branches to 4 domains -->
  <!-- Vente/Achat -->
  <line x1="430" y1="85" x2="120" y2="120" stroke="#64748b" stroke-width="1.5"/>
  <rect x="20" y="120" width="200" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a8a">Vente / Achat</text>

  <!-- Logistique -->
  <line x1="430" y1="85" x2="310" y2="120" stroke="#64748b" stroke-width="1.5"/>
  <rect x="225" y="120" width="170" height="40" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="310" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#064e3b">Logistique</text>

  <!-- RH -->
  <line x1="430" y1="85" x2="545" y2="120" stroke="#64748b" stroke-width="1.5"/>
  <rect x="460" y="120" width="170" height="40" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="545" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#713f12">RH</text>

  <!-- Finance -->
  <line x1="430" y1="85" x2="760" y2="120" stroke="#64748b" stroke-width="1.5"/>
  <rect x="660" y="120" width="180" height="40" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="750" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#3b0764">Finance</text>

  <!-- Vente/Achat KPIs -->
  <line x1="60" y1="160" x2="60" y2="185" stroke="#3b82f6" stroke-width="1.2"/>
  <rect x="15" y="185" width="90" height="32" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="60" y="198" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">CA (revenue)</text>
  <text x="60" y="210" text-anchor="middle" font-size="9" fill="#3b82f6">Σ prix × qté</text>

  <line x1="120" y1="160" x2="120" y2="185" stroke="#3b82f6" stroke-width="1.2"/>
  <rect x="75" y="185" width="90" height="32" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="120" y="198" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Marge brute</text>
  <text x="120" y="210" text-anchor="middle" font-size="9" fill="#3b82f6">(CA-coût)/CA %</text>

  <line x1="185" y1="160" x2="185" y2="185" stroke="#3b82f6" stroke-width="1.2"/>
  <rect x="140" y="185" width="90" height="32" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="185" y="198" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Panier moyen</text>
  <text x="185" y="210" text-anchor="middle" font-size="9" fill="#3b82f6">CA / cmd. dist.</text>

  <!-- Vente/Achat sub -->
  <line x1="60" y1="217" x2="60" y2="240" stroke="#93c5fd" stroke-width="1"/>
  <rect x="15" y="240" width="90" height="28" rx="4" fill="#f0f9ff" stroke="#bfdbfe"/>
  <text x="60" y="254" text-anchor="middle" font-size="9" fill="#1d4ed8">ex. 1 500 €</text>
  <text x="60" y="264" text-anchor="middle" font-size="9" fill="#1d4ed8">→ comparer vs N-1</text>

  <line x1="120" y1="217" x2="120" y2="240" stroke="#93c5fd" stroke-width="1"/>
  <rect x="75" y="240" width="90" height="28" rx="4" fill="#f0f9ff" stroke="#bfdbfe"/>
  <text x="120" y="254" text-anchor="middle" font-size="9" fill="#1d4ed8">ex. 40 %</text>
  <text x="120" y="264" text-anchor="middle" font-size="9" fill="#1d4ed8">→ OK si ≥ seuil</text>

  <line x1="185" y1="217" x2="185" y2="240" stroke="#93c5fd" stroke-width="1"/>
  <rect x="140" y="240" width="90" height="28" rx="4" fill="#f0f9ff" stroke="#bfdbfe"/>
  <text x="185" y="254" text-anchor="middle" font-size="9" fill="#1d4ed8">ex. 75 €</text>
  <text x="185" y="264" text-anchor="middle" font-size="9" fill="#1d4ed8">→ par canal</text>

  <!-- Logistique KPIs -->
  <line x1="270" y1="160" x2="270" y2="185" stroke="#10b981" stroke-width="1.2"/>
  <rect x="228" y="185" width="84" height="32" rx="5" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="270" y="198" text-anchor="middle" font-size="10" font-weight="bold" fill="#064e3b">Taux rupture</text>
  <text x="270" y="210" text-anchor="middle" font-size="9" fill="#059669">ruptures/total %</text>

  <line x1="360" y1="160" x2="360" y2="185" stroke="#10b981" stroke-width="1.2"/>
  <rect x="315" y="185" width="90" height="32" rx="5" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="360" y="198" text-anchor="middle" font-size="10" font-weight="bold" fill="#064e3b">Lead time</text>
  <text x="360" y="210" text-anchor="middle" font-size="9" fill="#059669">livraison-commande</text>

  <!-- Logistique sub -->
  <line x1="270" y1="217" x2="270" y2="240" stroke="#6ee7b7" stroke-width="1"/>
  <rect x="228" y="240" width="84" height="28" rx="4" fill="#f0fdf4" stroke="#a7f3d0"/>
  <text x="270" y="254" text-anchor="middle" font-size="9" fill="#047857">ex. 2 %</text>
  <text x="270" y="264" text-anchor="middle" font-size="9" fill="#047857">→ cible &lt; 1 %</text>

  <line x1="360" y1="217" x2="360" y2="240" stroke="#6ee7b7" stroke-width="1"/>
  <rect x="315" y="240" width="90" height="28" rx="4" fill="#f0fdf4" stroke="#a7f3d0"/>
  <text x="360" y="254" text-anchor="middle" font-size="9" fill="#047857">ex. 3,2 j moy.</text>
  <text x="360" y="264" text-anchor="middle" font-size="9" fill="#047857">→ Q3 = 4 j</text>

  <!-- RH KPIs -->
  <line x1="505" y1="160" x2="505" y2="185" stroke="#eab308" stroke-width="1.2"/>
  <rect x="460" y="185" width="90" height="32" rx="5" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="505" y="198" text-anchor="middle" font-size="10" font-weight="bold" fill="#713f12">Turnover</text>
  <text x="505" y="210" text-anchor="middle" font-size="9" fill="#a16207">départs/moy.eff %</text>

  <line x1="600" y1="160" x2="600" y2="185" stroke="#eab308" stroke-width="1.2"/>
  <rect x="552" y="185" width="96" height="32" rx="5" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="600" y="198" text-anchor="middle" font-size="10" font-weight="bold" fill="#713f12">Absentéisme</text>
  <text x="600" y="210" text-anchor="middle" font-size="9" fill="#a16207">absences/théo %</text>

  <!-- RH sub -->
  <line x1="505" y1="217" x2="505" y2="240" stroke="#fde047" stroke-width="1"/>
  <rect x="460" y="240" width="90" height="28" rx="4" fill="#fefce8" stroke="#fef08a"/>
  <text x="505" y="254" text-anchor="middle" font-size="9" fill="#92400e">ex. 12 %</text>
  <text x="505" y="264" text-anchor="middle" font-size="9" fill="#92400e">→ alerte si &gt; 15 %</text>

  <line x1="600" y1="217" x2="600" y2="240" stroke="#fde047" stroke-width="1"/>
  <rect x="552" y="240" width="96" height="28" rx="4" fill="#fefce8" stroke="#fef08a"/>
  <text x="600" y="254" text-anchor="middle" font-size="9" fill="#92400e">ex. 4,5 %</text>
  <text x="600" y="264" text-anchor="middle" font-size="9" fill="#92400e">→ sectoriel ~4 %</text>

  <!-- Finance KPIs -->
  <line x1="710" y1="160" x2="710" y2="185" stroke="#7c3aed" stroke-width="1.2"/>
  <rect x="663" y="185" width="94" height="32" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="710" y="198" text-anchor="middle" font-size="10" font-weight="bold" fill="#3b0764">DSO</text>
  <text x="710" y="210" text-anchor="middle" font-size="9" fill="#6d28d9">créances/CA×jours</text>

  <line x1="800" y1="160" x2="800" y2="185" stroke="#7c3aed" stroke-width="1.2"/>
  <rect x="752" y="185" width="98" height="32" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="801" y="198" text-anchor="middle" font-size="10" font-weight="bold" fill="#3b0764">Budget/Réel</text>
  <text x="801" y="210" text-anchor="middle" font-size="9" fill="#6d28d9">(réel-budget)/budget</text>

  <!-- Finance sub -->
  <line x1="710" y1="217" x2="710" y2="240" stroke="#c4b5fd" stroke-width="1"/>
  <rect x="663" y="240" width="94" height="28" rx="4" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="710" y="254" text-anchor="middle" font-size="9" fill="#5b21b6">ex. 45 j</text>
  <text x="710" y="264" text-anchor="middle" font-size="9" fill="#5b21b6">→ surveiller si ↑</text>

  <line x1="801" y1="217" x2="801" y2="240" stroke="#c4b5fd" stroke-width="1"/>
  <rect x="752" y="240" width="98" height="28" rx="4" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="801" y="254" text-anchor="middle" font-size="9" fill="#5b21b6">+12 % coûts</text>
  <text x="801" y="264" text-anchor="middle" font-size="9" fill="#5b21b6">→ dépassement !</text>

  <!-- Legend at bottom -->
  <text x="430" y="310" text-anchor="middle" font-size="10" fill="#64748b">Chaque KPI a une formule normée + un piège d'interprétation — voir les leçons du module 03.</text>
</svg>
