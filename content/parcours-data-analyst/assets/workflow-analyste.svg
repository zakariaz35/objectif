<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 160" width="820" height="160" font-family="system-ui, sans-serif">
  <rect width="820" height="160" fill="#f8fafc" rx="10"/>

  <!-- Step boxes -->
  <!-- 1. Question -->
  <rect x="10" y="40" width="130" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="75" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a8a">1. Question</text>
  <text x="75" y="90" text-anchor="middle" font-size="11" fill="#1e40af">métier</text>
  <text x="75" y="107" text-anchor="middle" font-size="10" fill="#3b82f6">Que veut-on savoir ?</text>

  <!-- Arrow 1→2 -->
  <line x1="140" y1="80" x2="168" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. Collecte -->
  <rect x="170" y="40" width="130" height="80" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="235" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#064e3b">2. Collecte</text>
  <text x="235" y="90" text-anchor="middle" font-size="11" fill="#065f46">SQL · fichiers · API</text>
  <text x="235" y="107" text-anchor="middle" font-size="10" fill="#10b981">Sources identifiées</text>

  <!-- Arrow 2→3 -->
  <line x1="300" y1="80" x2="328" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3. Nettoyage -->
  <rect x="330" y="40" width="130" height="80" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="395" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#713f12">3. Nettoyage</text>
  <text x="395" y="90" text-anchor="middle" font-size="11" fill="#854d0e">doublons · formats</text>
  <text x="395" y="107" text-anchor="middle" font-size="10" fill="#ca8a04">≈ 60-80 % du temps</text>

  <!-- Arrow 3→4 -->
  <line x1="460" y1="80" x2="488" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. Analyse -->
  <rect x="490" y="40" width="130" height="80" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="555" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#3b0764">4. Analyse</text>
  <text x="555" y="90" text-anchor="middle" font-size="11" fill="#5b21b6">filtrer · grouper</text>
  <text x="555" y="107" text-anchor="middle" font-size="10" fill="#7c3aed">agréger · calculer</text>

  <!-- Arrow 4→5 -->
  <line x1="620" y1="80" x2="648" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5. Restitution -->
  <rect x="650" y="40" width="155" height="80" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="727" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#831843">5. Restitution</text>
  <text x="727" y="90" text-anchor="middle" font-size="11" fill="#9d174d">dashboard · insights</text>
  <text x="727" y="107" text-anchor="middle" font-size="10" fill="#ec4899">recommandations</text>

  <!-- Feedback arrow (curved back) -->
  <path d="M 727 120 Q 400 155 75 120" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowGray)"/>
  <text x="400" y="152" text-anchor="middle" font-size="10" fill="#64748b">feedback → nouvelle question</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
